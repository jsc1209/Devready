name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    name: Backend (Spring Boot) Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle (skip tests)
        run: ./gradlew build -x test --no-daemon
        env:
          # 컨텍스트 로딩 없이 빌드만 하므로 더미값으로 충분
          DB_URL: jdbc:mysql://localhost:3306/devready
          DB_USERNAME: root
          DB_PASSWORD: dummy
          JWT_SECRET: ci_dummy_secret_at_least_32_bytes_long_padding_xxxxxxxx

  frontend-build:
    name: Frontend (Vite) Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_AUTH_API_BASE_URL: http://localhost:8080

  docker-build:
    name: Docker Images Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: devready-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: devready-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
            VITE_AUTH_API_BASE_URL=http://localhost:8080
