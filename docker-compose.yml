services:
  mysql:
    image: mysql:8.0
    container_name: devready-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-devready}
      MYSQL_DATABASE: devready
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-devready}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: devready-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/devready?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-devready}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 604800000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_AUTH_API_BASE_URL: http://localhost:8080
    container_name: devready-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
